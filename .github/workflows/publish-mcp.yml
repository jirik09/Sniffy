name: Publish MCP Package

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build sniffy-mcp package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LEO_sniffy/tools/sniffy_mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fetch MCP tags
        shell: bash
        run: git fetch --tags --force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Prepare MCP release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=$(python release_metadata.py show --field version --tag "${GITHUB_REF_NAME}")
            TAG=$(python release_metadata.py show --field tag --tag "${GITHUB_REF_NAME}")
          else
            VERSION=$(python release_metadata.py show --field version --auto-bump)
            TAG=$(python release_metadata.py show --field tag --auto-bump)
          fi

          python release_metadata.py write-version --version "$VERSION"
          python release_metadata.py validate --expected-tag "$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate workflow trigger
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_TAG="${{ steps.metadata.outputs.tag }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
              echo "Triggered MCP tag ${GITHUB_REF_NAME} does not match package tag $EXPECTED_TAG"
              exit 1
            fi
          elif git rev-parse -q --verify "refs/tags/$EXPECTED_TAG" >/dev/null; then
            echo "MCP release tag $EXPECTED_TAG already exists. Bump sniffy-mcp version before publishing again."
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .release-venv
          source .release-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
import sniffy_mcp

print(sniffy_mcp.__version__)
PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sniffy-mcp-dist
          path: LEO_sniffy/tools/sniffy_mcp/dist/*

      - name: Ensure MCP release exists
        uses: actions/github-script@v7
        env:
          MCP_TAG: ${{ steps.metadata.outputs.tag }}
          MCP_VERSION: ${{ steps.metadata.outputs.version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.MCP_TAG;
            const name = `sniffy-mcp ${process.env.MCP_VERSION}`;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                generate_release_notes: true,
              });
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          files: |
            LEO_sniffy/tools/sniffy_mcp/dist/*.whl
            LEO_sniffy/tools/sniffy_mcp/dist/*.tar.gz
          generate_release_notes: true
          overwrite_files: true