name: Release Installer

on:
  push:
    tags:
      - 'desktop-v*' # Trigger on tags like desktop-v1.0.0, desktop-v2.3.4

permissions:
  contents: write

jobs:
  mcp_plan:
    name: Plan MCP publish
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      last_tag: ${{ steps.diff.outputs.last_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fetch MCP tags
        shell: bash
        run: git fetch --tags --force

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read MCP metadata
        id: meta
        shell: bash
        working-directory: LEO_sniffy/tools/sniffy_mcp
        run: |
          set -euo pipefail
          VERSION=$(python release_metadata.py show --field version --auto-bump)
          TAG=$(python release_metadata.py show --field tag --auto-bump)
          python release_metadata.py validate --expected-tag "$TAG" --auto-bump
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Detect MCP changes since last MCP release
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          LAST_TAG=$(git tag --list 'mcp-v*' --sort=-creatordate | head -n 1 || true)
          if [ -z "$LAST_TAG" ]; then
            CHANGED=true
          elif git diff --quiet "$LAST_TAG"..HEAD -- LEO_sniffy/tools/sniffy_mcp; then
            CHANGED=false
          else
            CHANGED=true
          fi

          if [ "$CHANGED" = true ] && git rev-parse -q --verify "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null; then
            echo "MCP changed since $LAST_TAG but tag ${{ steps.meta.outputs.tag }} already exists. Bump sniffy-mcp version before cutting the app release."
            exit 1
          fi

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: mcp_plan
    strategy:
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_mingw
          - os: ubuntu-latest
            qt_arch: linux_gcc_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0'
          host: ${{ runner.os == 'Windows' && 'windows' || 'linux' }}
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtcharts qtserialport'
          tools: ${{ runner.os == 'Windows' && 'tools_mingw1310' || '' }}
          
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libusb-1.0-0-dev libstlink-dev ninja-build libcups2-dev libvulkan-dev

      - name: Setup Ninja (Windows)
        if: runner.os == 'Windows'
        uses: ashutoshvarma/setup-ninja@master

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis

      # Explicitly find and set the Qt MinGW compiler on Windows
      # to avoid picking up the broken system path C:/mingw64/bin/gcc.exe
      - name: Setup MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          # Only look inside the ../Qt directory which is where install-qt-action installs release
          $qtRoot = Resolve-Path "../Qt"
          
          # Find the Qt toolchain directory (e.g. mingw_1310_64)
          $mwDirs = Get-ChildItem -Path "$qtRoot/Tools" -Directory -Filter "mingw*_64" -ErrorAction SilentlyContinue
          
          if ($mwDirs) {
              # Pick the newest version numerically (e.g. 1120 over 730)
              $picked = $mwDirs | ForEach-Object {
                  $m = [regex]::Match($_.Name, 'mingw(\d+)_64')
                  if ($m.Success) {
                      [pscustomobject]@{ Dir = $_; VersionNum = [int]$m.Groups[1].Value }
                  }
              } | Sort-Object VersionNum -Descending | Select-Object -First 1
              
              if ($picked) {
                  $targetDir = $picked.Dir
                  $binDir = Join-Path $targetDir.FullName "bin"
                  $gcc = Join-Path $binDir "gcc.exe"
                  $gpp = Join-Path $binDir "g++.exe"
                  
                  if ((Test-Path $gcc) -and (Test-Path $gpp)) {
                      echo "Found MinGW toolchain at: $($targetDir.FullName)"
                      
                      # Set CMake variables for compiler
                      echo "CC=$gcc" >> $env:GITHUB_ENV
                      echo "CXX=$gpp" >> $env:GITHUB_ENV
                      
                      # Add to PATH so runtime DLLs are found
                      echo "$binDir" >> $env:GITHUB_PATH
                  } else {
                      echo "Error: gcc/g++ not found in $($binDir)"
                      exit 1
                  }
              } else {
                  echo "Error: Could not parse version from MinGW directories"
                  $mwDirs | Format-List
                  exit 1
              }
          } else {
              echo "Error: No MinGW toolchain directory found in $qtRoot/Tools" 
              Get-ChildItem -Path "$qtRoot/Tools" -Recurse
              exit 1
          }

      - name: Configure CMake
        run: cmake -S LEO_sniffy -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Create Installer (CPack)
        run: |
          cd build
          cpack -C Release -V
        shell: bash

      - name: Derive desktop release version
        shell: bash
        run: echo "SNIFFY_DESKTOP_VERSION=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_ENV"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Sniffy Desktop ${{ env.SNIFFY_DESKTOP_VERSION }}
          files: |
            build/Sniffy-*.exe
            build/*.msi
            build/*.deb
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mcp_package:
    name: Build MCP package
    runs-on: ubuntu-latest
    needs: mcp_plan
    if: needs.mcp_plan.outputs.changed == 'true'
    defaults:
      run:
        working-directory: LEO_sniffy/tools/sniffy_mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare MCP package version
        run: python release_metadata.py write-version --version "${{ needs.mcp_plan.outputs.version }}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate MCP release metadata
        run: python release_metadata.py validate --expected-tag "${{ needs.mcp_plan.outputs.tag }}"

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .release-venv
          source .release-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import sniffy_mcp

          print(sniffy_mcp.__version__)
          PY

      - name: Upload MCP package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sniffy-mcp-dist
          path: LEO_sniffy/tools/sniffy_mcp/dist/*

  mcp_publish:
    name: Publish MCP with app release
    runs-on: ubuntu-latest
    needs:
      - mcp_plan
      - mcp_package
      - build
    if: needs.mcp_plan.outputs.changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download MCP package artifact
        uses: actions/download-artifact@v4
        with:
          name: sniffy-mcp-dist
          path: mcp_dist

      - name: Ensure MCP release exists
        uses: actions/github-script@v7
        env:
          MCP_TAG: ${{ needs.mcp_plan.outputs.tag }}
          MCP_VERSION: ${{ needs.mcp_plan.outputs.version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.MCP_TAG;
            const name = `Sniffy MCP ${process.env.MCP_VERSION}`;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                body: '',
              });
            }

      - name: Upload MCP assets to standalone MCP release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.mcp_plan.outputs.tag }}
          name: Sniffy MCP ${{ needs.mcp_plan.outputs.version }}
          body: ''
          files: |
            mcp_dist/*.whl
            mcp_dist/*.tar.gz
          overwrite_files: true
